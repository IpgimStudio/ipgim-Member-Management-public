name: Slack Logger

on:
  schedule:
    # 💡 UTC 기준 설정 (KST = UTC + 9시간)
    
    # 1. 아침 출근 피크 구간 (KST 08:00 ~ 09:10)
    # 08:00~08:20 (10분 단위 얼리버드) / ★08:30~09:10 (5분 단위 정밀 피크)★
    - cron: '0,10,20,30,35,40,45,50,55 23 * * *' # KST 08:00~08:55
    - cron: '0,5,10 0 * * *'                      # KST 09:00~09:10

    # 2. 낮 시간 및 자율출근 마감/반차/알바 퇴근 구간 (KST 09:15 ~ 17:15) -> 15분 단위
    - cron: '15,30,45 0 * * *'                    # KST 09:15~09:45 (출근 마무리 감시)
    - cron: '*/15 1-7 * * *'                      # KST 10:00~16:45 (11시 유연근무 마감 및 12시 알바 퇴근/반차 완벽 커버)
    - cron: '0,15 8 * * *'                        # KST 17:00, 17:15

    # 3. 저녁 퇴근 피크 구간 (KST 17:30 ~ 18:30) -> ★5분 단위 정밀 피크★
    - cron: '30,35,40,45,50,55 8 * * *'           # KST 17:30 ~ 17:55
    - cron: '0,5,10,15,20,25,30 9 * * *'          # KST 18:00 ~ 18:30

    # 4. 야근 및 퇴근 잔여 구간 (KST 18:45 ~ 22:40) -> 20분 단위 전환
    - cron: '45 9 * * *'                          # KST 18:45
    - cron: '*/20 10-13 * * *'                    # KST 19:00 ~ 22:40

    # 5. 마감 알림톡 예약 및 익일 새벽 퇴근 구간 (KST 23:00 ~ 익일 01:40) -> 20분 단위
    - cron: '10,30,50 14 * * *'                   # KST 23:10, 23:30, 23:50 (★23:50 누락자 DM 정밀 타격)
    - cron: '0,20,40 15-16 * * *'                 # KST 00:00 ~ 01:40 (새벽 야근자 커버)

  workflow_dispatch:  # 관리자 수동 즉시 실행 열림

jobs:
  fetch-and-log:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Slack → Sheets logger
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GOOGLE_SERVICE_EMAIL: ${{ secrets.GOOGLE_SERVICE_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: node src/index.js